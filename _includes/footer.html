<!-- ============ FOOTER ============ -->
<footer class="bg-krijt text-inkt/60 py-6 border-t border-inkt/10">
  <div class="max-w-6xl mx-auto px-6 flex flex-wrap items-center justify-center md:justify-between gap-x-4 gap-y-2 text-xs text-center">
    <span class="font-display font-semibold text-inkt text-sm">FortCRM</span>
    <span class="font-mono">KVK: 42105837 · SBI 62.02 / 70.22</span>
    <span>© 2026 FortCRM</span>
    <button id="cookie-settings-link" class="underline hover:text-inkt transition-colors">Cookievoorkeuren</button>
  </div>
</footer>

<!-- ============ COOKIEBANNER ============ -->
<div id="cookie-banner" class="fixed inset-x-0 bottom-0 z-50 hidden bg-krijt/95 backdrop-blur border-t border-inkt/10">
  <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row items-center gap-4 text-sm">
    <p class="text-inkt/70 flex-1">
      We gebruiken alleen analytics-cookies met jouw toestemming, om te begrijpen hoe bezoekers de site gebruiken. Geen marketing- of trackingcookies van derden.
    </p>
    <div class="flex items-center gap-3 flex-shrink-0">
      <button id="cookie-decline" class="text-sm font-medium text-inkt/70 hover:text-inkt transition-colors">Weigeren</button>
      <button id="cookie-accept" class="btn btn-sm border-none bg-vermiljoen hover:bg-vermiljoen/90 text-inkt font-semibold normal-case rounded-full px-5">Accepteren</button>
    </div>
  </div>
</div>

<!-- Mobile menu toggle -->
<script>
  var menuToggle = document.getElementById('menu-toggle');
  var menuClose = document.getElementById('menu-close');
  var mobileMenu = document.getElementById('mobile-menu');
  var backdrop = document.getElementById('mobile-menu-backdrop');

  function openMenu() {
    mobileMenu.classList.remove('translate-x-full');
    backdrop.classList.remove('hidden');
  }
  function closeMenu() {
    mobileMenu.classList.add('translate-x-full');
    backdrop.classList.add('hidden');
  }

  menuToggle.addEventListener('click', openMenu);
  menuClose.addEventListener('click', closeMenu);
  backdrop.addEventListener('click', closeMenu);
  document.querySelectorAll('#mobile-menu a').forEach(function (link) {
    link.addEventListener('click', closeMenu);
  });
</script>

<!-- Dark mode toggle -->
<script>
  document.querySelectorAll('.theme-toggle-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var dark = !document.documentElement.classList.contains('dark');
      document.documentElement.classList.toggle('dark', dark);
      localStorage.setItem('fortcrm-theme', dark ? 'dark' : 'light');
    });
  });
</script>

<!-- Cookiebanner (analytics-toestemming) -->
<script>
  (function () {
    var banner = document.getElementById('cookie-banner');
    var acceptBtn = document.getElementById('cookie-accept');
    var declineBtn = document.getElementById('cookie-decline');
    var settingsLink = document.getElementById('cookie-settings-link');

    function setConsent(granted) {
      localStorage.setItem('fortcrm-consent', granted ? 'granted' : 'denied');
      if (typeof gtag === 'function') {
        gtag('consent', 'update', { analytics_storage: granted ? 'granted' : 'denied' });
      }
      banner.classList.add('hidden');
    }

    if (!localStorage.getItem('fortcrm-consent')) {
      banner.classList.remove('hidden');
    }

    acceptBtn.addEventListener('click', function () { setConsent(true); });
    declineBtn.addEventListener('click', function () { setConsent(false); });
    settingsLink.addEventListener('click', function () { banner.classList.remove('hidden'); });
  })();
</script>
