{%- assign type = include.type -%}
<span class="js-pkg-icon relative inline-flex" tabindex="0">
  {%- if type == "yes" -%}
  <span class="inline-flex w-6 h-6 rounded-full bg-viridiaan/15 items-center justify-center cursor-help">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M4 10l4 4 8-8" stroke="#2C6C4F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </span>
  {%- elsif type == "partial" -%}
  <span class="inline-flex w-6 h-6 rounded-full bg-oker/20 items-center justify-center cursor-help">
    <svg width="10" height="10" viewBox="0 0 20 20"><circle cx="10" cy="10" r="6" fill="#D99F3C"/></svg>
  </span>
  {%- else -%}
  <span class="inline-flex w-6 h-6 rounded-full bg-inkt/8 items-center justify-center cursor-help">
    <svg width="12" height="12" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-opacity="0.35" stroke-width="2.5" stroke-linecap="round"/></svg>
  </span>
  {%- endif -%}
  <span data-pkg-tip class="hidden fixed z-50 -translate-x-1/2 -translate-y-full w-48 rounded-lg bg-inkt text-krijt text-xs leading-snug px-3 py-2 pointer-events-none text-center">
    {{ include.tooltip }}
    <span class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-inkt"></span>
  </span>
</span>
