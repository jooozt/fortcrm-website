<script>
(function () {
  var GAP = 8;

  function tipFor(icon) {
    return icon.querySelector('[data-pkg-tip]');
  }

  function show(icon) {
    var tip = tipFor(icon);
    if (!tip) return;
    var r = icon.getBoundingClientRect();
    tip.style.left = (r.left + r.width / 2) + 'px';
    tip.style.top = (r.top - GAP) + 'px';
    tip.classList.remove('hidden');
  }

  function hide(icon) {
    var tip = tipFor(icon);
    if (tip) tip.classList.add('hidden');
  }

  function hideAll() {
    document.querySelectorAll('.js-pkg-icon [data-pkg-tip]').forEach(function (tip) {
      tip.classList.add('hidden');
    });
  }

  document.querySelectorAll('.js-pkg-icon').forEach(function (icon) {
    icon.addEventListener('mouseenter', function () { show(icon); });
    icon.addEventListener('mouseleave', function () { hide(icon); });
    icon.addEventListener('focus', function () { show(icon); });
    icon.addEventListener('blur', function () { hide(icon); });
  });

  window.addEventListener('scroll', hideAll, true);
  window.addEventListener('resize', hideAll);
})();
</script>
