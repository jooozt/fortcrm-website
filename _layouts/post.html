---
layout: default
---
<article class="max-w-3xl mx-auto px-6 py-20">
  <a href="/blog/" class="text-sm font-medium text-viridiaan hover:text-inkt transition-colors">← Terug naar het blog</a>

  <p class="font-mono text-xs tracking-[0.2em] text-viridiaan uppercase mt-8 mb-4">
    {{ page.date | date: "%-d %B %Y" }}
  </p>
  <h1 class="font-display font-bold text-3xl md:text-4xl leading-tight mb-10">{{ page.title }}</h1>

  <div class="prose-post">
    {{ content }}
  </div>
</article>
